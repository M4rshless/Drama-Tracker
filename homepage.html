<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/login-box.css" />
    <link rel="stylesheet" href="./styles/image-slider.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <!-- Header loads here automatically -->
    <div id="header"></div>

    <!-- Your page content stays exactly the same -->
    <div>
      This is the homepage
    </div>

    <section class="container">
      <div class="slider-wrapper">
        <div class="slider">
          <img id="slide1" src="./images/smi-laptop.png" alt="picture1" />
          <img id="slide2" src="./images/smifold.png" alt="picture2" />
          <img id="slide3" src="./images/smipaint.png" alt="picture3" />
        </div>
        <div class="slider-nav">
          <a href="#slide1"></a>
          <a href="#slide2"></a>
          <a href="#slide3"></a>
        </div>
      </div>
    </section>

    <!-- Footer loads here automatically -->
    <div id="footer"></div>

    <script src="./scripts/slider.js"></script>
    <script src="./scripts/components.js"></script>
    <script>
      renderHeader('home')
      renderFooter()
    </script>

  </body>
</html>
