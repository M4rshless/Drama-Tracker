<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Site Title</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f0;
      --ink: #1a1410;
      --muted: #7a6e64;
      --soft: #c8bfb3;
      --accent: #c8472b;
      --accent-light: #f5ded9;
      --card-shadow: 0 2px 20px rgba(0,0,0,0.07);
      --card-shadow-hover: 0 8px 40px rgba(0,0,0,0.13);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    h1 { font-size: 2.5rem; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to Your Site</h1>
    <p>Start building here.</p>
  </main>
</body>
</html>
