<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/login-box.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <!-- Header loads here automatically -->
    <div id="header"></div>

    <!-- BELOW THIS IS EXCLUSIVE TO LOGIN PAGE -->
    <div class="content">
      <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username" />
        <input type="password" placeholder="Password" />
        <button type="submit">Login</button>
      </div>
      Choose your character
    </div>

    <!-- Footer loads here automatically -->
    <div id="footer"></div>

    <script src="./scripts/components.js"></script>
    <script>
      renderHeader('login')
      renderFooter()
    </script>

  </body>
</html>
